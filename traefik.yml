providers:
  docker:
    network: traefik
    exposedByDefault: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: 0s
        writeTimeout: 0s
        idleTimeout: 600s

serversTransport:
  forwardingTimeouts:
    dialTimeout: 30s
    responseHeaderTimeout: 0s
    idleConnTimeout: 0s

certificatesResolvers:
  letsencrypt:
    acme:
      email: falonofthetower@gmail.com
      storage: /acme/acme.json
      dnsChallenge:
        provider: cloudflare

ping:
  entryPoint: websecure
